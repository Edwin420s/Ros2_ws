# Turtlebot3 Simulation Configuration File
# This file contains default parameters for the simulation

# Velocity Controller Parameters
velocity_controller:
  ros__parameters:
    max_linear_speed: 0.2    # m/s
    max_angular_speed: 0.5    # rad/s
    motion_pattern: "square"  # square, circle, figure8, stop
    publish_rate: 10.0        # Hz

# Teleoperation Parameters
teleop_node:
  ros__parameters:
    linear_speed: 0.2         # m/s
    angular_speed: 0.5        # rad/s
    publish_rate: 10.0        # Hz

# Service Server Parameters
service_server:
  ros__parameters:
    default_linear_speed: 0.2  # m/s
    default_angular_speed: 0.5  # rad/s
    status_publish_rate: 1.0    # Hz

# Robot Description Parameters
robot_description:
  ros__parameters:
    # Gazebo simulation parameters
    use_sim_time: true
    
    # Robot physical parameters
    wheel_separation: 0.16     # m
    wheel_diameter: 0.066      # m
    max_wheel_torque: 5.0      # N⋅m
    max_wheel_acceleration: 1.0 # m/s²

# Sensor Parameters
lidar:
  ros__parameters:
    min_range: 0.12            # m
    max_range: 3.5             # m
    scan_frequency: 10.0       # Hz
    samples: 360               # number of samples

imu:
  ros__parameters:
    frequency: 100.0           # Hz
    noise_variance: 0.01       # noise level

# RViz Configuration
rviz:
  ros__parameters:
    fixed_frame: "odom"
    update_rate: 30            # Hz
